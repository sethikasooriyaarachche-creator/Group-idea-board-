  <div class="idea-form">
    <label for="name">Select Your Name:</label>

      <option value="Sarah Lee">Sethika sooriyaarachche</option>
      <option value="David Kumar">Sihath Lakjitha</option>
    </select>

    <label for="idea">Type Your Idea:</label>
    <textarea id="idea" rows="4" placeholder="Share your brilliant idea..."></textarea>

    <button onclick="addIdea()">Submit Idea</button>
  </div>

  <div class="ideas-section" id="ideasSection">
    <h2 style="color:#fff; text-align:center;">✅ Approved Ideas</h2>
    <div id="ideasList"></div>

    <h2 style="color:#fff; text-align:center; margin-top:30px;">⏳ Pending Ideas</h2>
    <div id="pendingList"></div>
  </div>

  <script>
    function addIdea() {
      const name = document.getElementById('name').value;
      const idea = document.getElementById('idea').value.trim();

      if (idea) {
        // Show ideas section after first submission
        document.getElementById('ideasSection').style.display = 'block';

        const ideaCard = document.createElement('div');
        ideaCard.className = 'idea-card pending-card';
        ideaCard.innerHTML = `<strong>${name}</strong> suggested: <p>${idea}</p>`;

        // Buttons container
        const btnContainer = document.createElement('div');
        btnContainer.className = 'card-buttons';

        // Approve button
        const approveBtn = document.createElement('button');
        approveBtn.className = 'approve-btn';
        approveBtn.textContent = 'Approve';
        approveBtn.onclick = function() {
          moveToApproved(ideaCard);
        };

        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = 'Delete';
        deleteBtn.onclick = function() {
          ideaCard.remove();
        };

        btnContainer.appendChild(approveBtn);
        btnContainer.appendChild(deleteBtn);
        ideaCard.appendChild(btnContainer);

        document.getElementById('pendingList').appendChild(ideaCard);
        document.getElementById('idea').value = ''; // clear box
      }
    }

    function moveToApproved(card) {
      // Remove buttons
      card.querySelector('.card-buttons').remove();
      card.classList.remove('pending-card');
      card.style.borderLeft = '6px solid #74ebd5';
      document.getElementById('ideasList').appendChild(card);
    }
  </script>
</body>
