<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Idea Board</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    h1 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 30px;
      color: #fff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .idea-form {
      max-width: 700px;
      margin: auto;
      background: rgba(255,255,255,0.85);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    label {
      font-weight: 700;
      margin-top: 10px;
      display: block;
      color: #333;
    }

    select, textarea, button {
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
    }

    select, textarea {
      background: #f9f9f9;
      color: #333;
    }

    textarea::placeholder {
      color: #999;
    }

    button {
      background: linear-gradient(135deg, #74ebd5, #9face6);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .ideas-list {
      max-width: 700px;
      margin: 40px auto;
    }

    .idea-card {
      background: rgba(255,255,255,0.9);
      border-left: 6px solid #74ebd5;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      animation: slideUp 0.6s ease;
      color: #333;
    }

    .idea-card strong {
      color: #9face6;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.95);}
      to {opacity: 1; transform: scale(1);}
    }

    @keyframes slideUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <h1>💡 Team Idea Board 💡</h1>

  <div class="idea-form">
    <label for="name">Select Your Name:</label>
    <select id="name">
      <option value="Imadh Nisar">Imadh Nisar</option>
      <option value="Sarah Lee">Sarah Lee</option>
      <option value="David Kumar">David Kumar</option>
    </select>

    <label for="idea">Type Your Idea:</label>
    <textarea id="idea" rows="4" placeholder="Share your brilliant idea..."></textarea>

    <button onclick="addIdea()">Submit Idea</button>
  </div>

  <div class="ideas-list" id="ideasList"></div>

  <script>
    function addIdea() {
      const name = document.getElementById('name').value;
      const idea = document.getElementById('idea').value.trim();

      if (idea) {
        const ideaCard = document.createElement('div');
        ideaCard.className = 'idea-card';
        ideaCard.innerHTML = `<strong>${name}</strong> suggested: <p>${idea}</p>`;
        document.getElementById('ideasList').appendChild(ideaCard);

        document.getElementById('idea').value = ''; // clear box
      }
    }
  </script>
</body>
</html>
