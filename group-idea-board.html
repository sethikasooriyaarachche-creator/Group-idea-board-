<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Idea Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 20px; /* Reduced padding for mobile */
      color: #333;
    }

    h1 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3rem); /* Dynamically scales font size */
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .idea-form, .ideas-section {
      width: 100%;
      max-width: 700px; /* Limits width on desktop */
      margin: 0 auto 30px auto;
      background: rgba(255,255,255,0.9);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      box-sizing: border-box; /* Ensures padding doesn't break width */
    }

    .ideas-section {
      background: transparent;
      box-shadow: none;
      padding: 0;
      display: none;
    }

    label { font-weight: 700; margin-top: 10px; display: block; }

    select, textarea, button {
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      background: linear-gradient(135deg, #74ebd5, #9face6);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.2s;
    }

    button:active { transform: scale(0.98); } /* Feedback for touch screens */

    .idea-card {
      background: #fff;
      border-left: 6px solid #74ebd5;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .idea-card strong { color: #9face6; font-size: 1.1rem; }

    .pending-card { border-left-color: #fbc02d; background: #fffdf5; }

    .done-card { background: #e0e0e0 !important; opacity: 0.8; }
    .done-card p, .done-card strong { text-decoration: line-through; }

    /* Stack buttons vertically on very small screens */
    .card-buttons { 
      margin-top: 15px; 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap; /* Allows wrapping on small devices */
    }

    .card-buttons button {
      flex: 1;
      min-width: 80px; /* Prevents buttons from getting too tiny */
      margin: 0;
      padding: 10px;
      font-size: 0.9rem;
    }

    .approve-btn { background: #4caf50; }
    .delete-btn { background: #e53935; }
    .done-btn { background: #2196f3; }

    .idea-text { 
      white-space: pre-wrap; 
      display: block; 
      margin: 10px 0; 
      word-wrap: break-word; /* Prevents long words from breaking layout */
    }

    footer {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.8);
      border-radius: 10px;
      font-size: 0.85rem;
    }

    /* Mobile-specific adjustments */
    @media (max-width: 480px) {
      body { padding: 10px; }
      .idea-form { padding: 15px; border-radius: 15px; }
      .card-buttons button { font-size: 0.8rem; padding: 12px 5px; }
    }
  </style>
</head>
<body>

  <h1>💡 Team Idea Board 💡</h1>

  <div class="idea-form">
    <label for="name">Select Your Name:</label>
    <select id="name">
      <option value="Imadh Nisar">Imadh Nisar</option>
      <option value="Kalshi Wijesinghe">Kalshi Wijesinghe</option>
      <option value="Chiraag Masakorala">Chiraag Masakorala</option>
      <option value="Kaushalya Athapaththu">Kaushalya Athapaththu</option>
      <option value="Thamasha Lionel">Thamasha Lionel</option>
      <option value="Niroshan Withanage">Niroshan Withanage</option>
      <option value="Anuk Indeepa">Anuk Indeepa</option>
      <option value="Sethika Sooriyaarachche">Sethika Sooriyaarachche</option>
      <option value="Sihath Lakjitha">Sihath Lakjitha</option>
    </select>

    <label for="idea">Type Your Idea:</label>
    <textarea id="idea" rows="3" maxlength="100" placeholder="Share your brilliant idea..."></textarea>

    <button onclick="addIdea()">Submit Idea</button>
  </div>

  <div class="ideas-section" id="ideasSection">
    <h2 style="color:#fff; text-align:center; font-size: 1.5rem;">✅ Approved</h2>
    <div id="ideasList"></div>

    <h2 style="color:#fff; text-align:center; margin-top:30px; font-size: 1.5rem;">⏳ Pending</h2>
    <div id="pendingList"></div>
  </div>

  <footer>
    © 2026 Team Idea Board
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', loadIdeas);

    function addIdea() {
      const name = document.getElementById('name').value;
      const ideaTextArea = document.getElementById('idea');
      const ideaValue = ideaTextArea.value;

      if (ideaValue.trim().length > 0) {
        const newIdea = {
          id: Date.now(),
          name: name,
          text: ideaValue,
          status: 'pending'
        };
        saveIdeaToStorage(newIdea);
        renderIdea(newIdea);
        ideaTextArea.value = '';
      } else {
        alert("Please enter an idea!");
      }
    }

    function renderIdea(idea) {
      const containerId = idea.status === 'pending' ? 'pendingList' : 'ideasList';
      const container = document.getElementById(containerId);
      
      const ideaCard = document.createElement('div');
      ideaCard.className = `idea-card ${idea.status}-card`;
      ideaCard.id = `card-${idea.id}`;

      ideaCard.innerHTML = `
        <strong>${idea.name}</strong>
        <p class="idea-text">${idea.text}</p>
        <div class="card-buttons" id="btns-${idea.id}"></div>
      `;

      container.appendChild(ideaCard);
      updateButtons(idea);
      document.getElementById('ideasSection').style.display = 'block';
    }

    function updateButtons(idea) {
      const btnContainer = document.getElementById(`btns-${idea.id}`);
      btnContainer.innerHTML = '';

      if (idea.status === 'pending') {
        btnContainer.append(
          createBtn('Approve', 'approve-btn', () => updateStatus(idea.id, 'approved')),
          createBtn('Delete', 'delete-btn', () => deleteIdea(idea.id))
        );
      } else if (idea.status === 'approved') {
        btnContainer.append(
          createBtn('Done', 'done-btn', () => updateStatus(idea.id, 'done')),
          createBtn('Delete', 'delete-btn', () => deleteIdea(idea.id))
        );
      } else {
        btnContainer.append(createBtn('Delete', 'delete-btn', () => deleteIdea(idea.id)));
      }
    }

    function createBtn(text, className, onClick) {
      const btn = document.createElement('button');
      btn.textContent = text;
      btn.className = className;
      btn.onclick = onClick;
      return btn;
    }

    function saveIdeaToStorage(idea) {
      let ideas = JSON.parse(localStorage.getItem('team_ideas')) || [];
      ideas.push(idea);
      localStorage.setItem('team_ideas', JSON.stringify(ideas));
    }

    function loadIdeas() {
      let ideas = JSON.parse(localStorage.getItem('team_ideas')) || [];
      document.getElementById('pendingList').innerHTML = '';
      document.getElementById('ideasList').innerHTML = '';
      if (ideas.length > 0) {
        ideas.forEach(renderIdea);
        document.getElementById('ideasSection').style.display = 'block';
      }
    }

    function updateStatus(id, newStatus) {
      let ideas = JSON.parse(localStorage.getItem('team_ideas')) || [];
      const index = ideas.findIndex(i => i.id === id);
      if (index > -1) {
        ideas[index].status = newStatus;
        localStorage.setItem('team_ideas', JSON.stringify(ideas));
        loadIdeas();
      }
    }

    function deleteIdea(id) {
      let ideas = JSON.parse(localStorage.getItem('team_ideas')) || [];
      ideas = ideas.filter(i => i.id !== id);
      localStorage.setItem('team_ideas', JSON.stringify(ideas));
      loadIdeas();
      if (ideas.length === 0) document.getElementById('ideasSection').style.display = 'none';
    }
  </script>
</body>
</html>
